name: Update player data

on:
  schedule:
    # Every day at 06:00 UTC (after Data Golf's overnight refresh)
    - cron: "0 6 * * *"
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the refreshed JSON back to main

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: Fetch Data Golf feeds
        working-directory: scripts
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
        run: python fetch_datagolf.py

      - name: Build players.json
        working-directory: scripts
        run: python build_players.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/players.json data/raw/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh player data $(date -u +'%Y-%m-%d')"
            git push
          fi
